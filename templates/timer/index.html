<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fast-comment Timer</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="app.js"></script>
</head>
<body>
  <main id="overlay" class="overlay bottom" aria-live="polite">
    <section id="timer" class="timer-card idle">
      <div id="label" class="timer-label">COUNTDOWN</div>
      <div id="time" class="timer-time">00:00</div>
      <div id="state" class="timer-state">IDLE</div>
    </section>
  </main>
</body>
</html>
